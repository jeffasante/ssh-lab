name: Deploy WASM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify debian.wasm is real binary (not LFS pointer)
        run: |
          magic=$(head -c 4 frontend/public/c2w/debian.wasm | xxd -p)
          echo "debian.wasm magic bytes: $magic"
          if [ "$magic" != "0061736d" ]; then
            echo "ERROR: debian.wasm is an LFS pointer, not a real WASM binary!"
            exit 1
          fi
          echo "OK: debian.wasm is a valid WASM binary."

      - name: Download python.wasm from container2wasm demo
        run: |
          BASEURL="https://ktock.github.io/container2wasm-demo/containers"
          OUTFILE="frontend/public/c2w/python.wasm"
          IMG="riscv64-python-wasi"
          echo "Downloading $IMG chunks..."
          chunks=0
          for i in $(seq -f "%02g" 0 99); do
            url="$BASEURL/${IMG}-container${i}.wasm"
            code=$(curl -sL -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then break; fi
            curl -sL "$url" -o "/tmp/${IMG}-chunk-${i}.wasm" &
            chunks=$((chunks+1))
          done
          wait
          if [ $chunks -gt 0 ]; then
            > "$OUTFILE"
            for i in $(seq -f "%02g" 0 $((chunks-1))); do
              cat "/tmp/${IMG}-chunk-${i}.wasm" >> "$OUTFILE"
            done
            echo "python.wasm ready: $(du -h "$OUTFILE" | cut -f1)"
          else
            echo "Warning: python.wasm chunks not found, skipping"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build WASM binary
        working-directory: server
        run: GOOS=js GOARCH=wasm go build -o ../frontend/public/ssh-lab.wasm .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
