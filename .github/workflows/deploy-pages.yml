name: Deploy WASM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify debian.wasm is real binary (not LFS pointer)
        run: |
          magic=$(head -c 4 frontend/public/c2w/debian.wasm | xxd -p)
          echo "debian.wasm magic bytes: $magic"
          if [ "$magic" != "0061736d" ]; then
            echo "ERROR: debian.wasm is an LFS pointer, not a real WASM binary!"
            exit 1
          fi
          echo "OK: debian.wasm is a valid WASM binary."

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build WASM binary
        working-directory: server
        run: GOOS=js GOARCH=wasm go build -o ../frontend/public/ssh-lab.wasm .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
